apiVersion: apps/v1
kind: Deployment
metadata:
  name: agenteia-api
  labels:
    app: agenteia-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agenteia-api
  template:
    metadata:
      labels:
        app: agenteia-api
    spec:
      containers:
        - name: api
          image: agenteia-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: agenteia-api-secrets
                optional: true
            - configMapRef:
                name: agenteia-api-config
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: agenteia-api
spec:
  selector:
    app: agenteia-api
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP

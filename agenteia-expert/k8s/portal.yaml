apiVersion: apps/v1
kind: Deployment
metadata:
  name: agenteia-portal
  labels:
    app: agenteia-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agenteia-portal
  template:
    metadata:
      labels:
        app: agenteia-portal
    spec:
      containers:
        - name: portal
          image: agenteia-portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agenteia-portal
  labels:
    app: agenteia-portal
spec:
  selector:
    app: agenteia-portal
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agenteia-portal
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: agenteia.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agenteia-portal
                port:
                  number: 80

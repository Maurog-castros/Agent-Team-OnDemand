# Host reverse proxy — team.maurocastro.cl
# Instalar:
#   sudo cp deploy/nginx/team.maurocastro.cl.conf /etc/nginx/sites-available/team.maurocastro.cl
#   sudo ln -sf /etc/nginx/sites-available/team.maurocastro.cl /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (Let's Encrypt):
#   sudo certbot --nginx -d team.maurocastro.cl

server {
    listen 80;
    listen [::]:80;
    server_name team.maurocastro.cl;

    client_max_body_size 20m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8093;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
